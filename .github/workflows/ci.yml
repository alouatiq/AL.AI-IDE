name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-frontend:
    name: Lint & static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Syntax-check all JavaScript
        run: |
          set -e
          for f in $(find assets/js api -name '*.js'); do
            node --check "$f" && echo "ok  $f"
          done
      - name: Validate JSON files
        run: |
          set -e
          for f in $(find . -name '*.json' -not -path './node_modules/*'); do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" && echo "ok  $f"
          done

  test-quality:
    name: Quality gates
    needs: lint-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every directory has a README
        run: |
          set -e
          missing=0
          while IFS= read -r dir; do
            case "$dir" in */.git*|*/node_modules*) continue;; esac
            if [ -z "$(ls -A "$dir"/README.md 2>/dev/null)" ]; then
              echo "::error::Missing README.md in $dir"; missing=1
            fi
          done < <(find . -type d -not -path '*/.git*' -not -path '*/node_modules*')
          exit $missing
      - name: Entry points present
        run: |
          test -f index.html && test -f assets/css/app.css && test -f assets/js/app.js
          echo "core files present"

  security-scan:
    name: Security scan
    needs: test-quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks
        run: |
          set -e
          VERSION=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" | tar -xz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Secret scan (filesystem)
        # Scan the working tree instead of a commit range — robust on the first
        # push where the initial commit has no parent to diff against.
        run: gitleaks detect --no-git --redact --verbose --source .
